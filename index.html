<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كارت معايدة لأية - AYA</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0c001c; /* لون الخلفية الغامق من الصورة */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: 'Courier New', Courier, monospace; /* خط ديجيتال */
            overflow: hidden;
        }

        /* حاوية الكارت */
        .card-container {
            position: relative;
            text-align: center;
            opacity: 0;
            transform: scale(0.8);
            animation: fadeInCard 1s ease-out forwards;
        }

        /* الصورة الأساسية للقلب */
        .heart-image {
            max-width: 90%;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.5); /* وهج وردي حول الكارت */
        }

        /* عنوان الموقع الوهمي فوق الكارت */
        .url-bar {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
        }

        /* أنيميشن لظهور الكارت */
        @keyframes fadeInCard {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="url-bar">madeforaya.vercel.app</div>
        
        <img src="aya-heart.png" alt="كارت معايدة لأية" class="heart-image">
    </div>

</body>
</html>
